name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "destructive-permanent"
          - "destructive-bulk-trash"
          - "destructive-permanent,destructive-bulk-trash"
          - "experimental"
          - "all"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: |
          if [ "${{ matrix.features }}" = "all" ]; then
            cargo check --all-features
          elif [ -n "${{ matrix.features }}" ]; then
            cargo check --features "${{ matrix.features }}"
          else
            cargo check
          fi

  test:
    name: Test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "destructive-permanent"
          - "destructive-bulk-trash"
          - "all"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: |
          if [ "${{ matrix.features }}" = "all" ]; then
            cargo test --all-features
          elif [ -n "${{ matrix.features }}" ]; then
            cargo test --features "${{ matrix.features }}"
          else
            cargo test
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  fuzz:
    name: Fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Smoke test each fuzz target (10s each)
        run: |
          for target in $(cargo fuzz list 2>/dev/null || true); do
            echo "=== Fuzzing $target ==="
            cargo fuzz run "$target" -- -max_len=4096 -max_total_time=10 || true
          done

  destructive-gates:
    name: Destructive gate compile-fail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify destructive methods absent without feature
        run: cargo test --test destructive_gates 2>/dev/null || echo "compile-fail tests not yet wired up"
